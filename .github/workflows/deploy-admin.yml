name: Deploy Admin

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Admin to VPS
        uses: appleboy/ssh-action@v1

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}

          script: |
            set -e

            echo "=== Pulling latest code ==="
            cd /home/apps/BigWhale/bigWhale_Admin
            git pull origin main

            echo "=== Building and restarting container ==="
            cd /home/apps/BigWhale
            docker compose build --no-cache bigwhale_admin
            docker compose up -d bigwhale_admin

             echo "=== Cleaning up old images ==="
            docker image prune -af
            docker builder prune -f

            echo "=== Admin deployed successfully at $(date) ==="